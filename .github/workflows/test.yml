name: test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (go ${{ matrix.go }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.24", "1.25", "1.26"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
      - name: go mod download
        run: go mod download
      - name: go vet
        run: go vet ./...
      - name: go test
        run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...
      - name: upload coverage
        if: matrix.go == '1.26'
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage.txt

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # golangci-lint v1.64.8 is built against go1.24 and its typecheck
          # analyzer cannot parse the go1.26 stdlib (fips140only_go1.26.go).
          # Pin the lint toolchain to 1.24 to match the linter; the module
          # itself targets go 1.22 and the test matrix still covers 1.24-1.26.
          # Revisit when migrating to golangci-lint v2.
          go-version: "1.24"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
